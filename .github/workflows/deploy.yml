# 构建 VitePress 站点并将其部署到 Cloudflare Pages
#
name: Deploy NiceGUI docs site to Cloudflare Pages

on:
  push:
    branches: [main]

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build with VitePress
        run: pnpm docs:build

      - name: Copy static files
        run: |
          if [ -d "./docs/static/" ]; then
            cp -r ./docs/static/* ./docs/.vitepress/dist/
            echo "Static files copied successfully"
          else
            echo "Warning: ./docs/static/ directory not found, skipping copy step"
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/.vitepress/dist --project-name=nicegui
